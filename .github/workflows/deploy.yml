name: Deploy Alumni Connect

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push client image
        run: |
          cd client
          docker build -t ${{ secrets.DOCKER_USERNAME }}/alumni-client:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/alumni-client:latest

      - name: Build and push server image
        run: |
          cd server
          docker build -t ${{ secrets.DOCKER_USERNAME }}/alumni-server:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/alumni-server:latest

      - name: Deploy with Docker Compose (optional)
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "docker pull ${{ secrets.DOCKER_USERNAME }}/alumni-client:latest && docker pull ${{ secrets.DOCKER_USERNAME }}/alumni-server:latest && cd /path/to/deployment && docker-compose up -d"
